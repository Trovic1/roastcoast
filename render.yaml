services:
  - type: web
    name: roastcast
    env: node
    buildCommand: apt-get install -y ffmpeg && npm install && npm run build
    startCommand: npm start
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ALEX
        sync: false
      - key: ELEVENLABS_VOICE_JAMIE
        sync: false
      - key: GITHUB_TOKEN
        sync: false